services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: development
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - API_INTERNAL_URL=http://api:8080
    depends_on:
      - api
    networks:
      - kawin

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: development
    ports:
      - "8080:8080"
    volumes:
      - ./apps/api:/app
    environment:
      - GO_ENV=development
      - PORT=8080
      - DATABASE_URL=postgres://kawin:kawin@db:5432/kawin?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - API_SECRET=dev-secret-change-in-prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - kawin

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: kawin
      POSTGRES_PASSWORD: kawin
      POSTGRES_DB: kawin
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kawin"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kawin

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - kawin

volumes:
  postgres_data:
  redis_data:

networks:
  kawin:
    driver: bridge
